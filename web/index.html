<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sygl — A Magykal RPG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a12;
      color: #e8dfc8;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 24px 0 8px;
      text-align: center;
      background: linear-gradient(180deg, #1a1228 0%, transparent 100%);
    }
    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.18em;
      color: #f5c842;
      text-shadow: 0 0 24px #f5c84288;
    }
    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #a098b8;
      letter-spacing: 0.08em;
    }
    #game-wrap {
      margin: 28px auto;
      width: 100%;
      max-width: 720px;
      padding: 0 16px;
    }
    #launch-screen {
      width: 100%;
      aspect-ratio: 240 / 160;
      background: #0d0b1a;
      border: 2px solid #3a2e5a;
      border-radius: 6px;
      box-shadow: 0 0 40px #7040ff44;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    #launch-screen h2 {
      font-size: 1.1rem;
      color: #a098b8;
      letter-spacing: 0.1em;
    }
    .launch-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      padding: 10px 22px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 0.05em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: #f5c842; color: #0a0a12; }
    .btn-drive {
      background: #2a2060;
      color: #e8dfc8;
      border: 1px solid #5040a0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-local {
      background: #1a2a1a;
      color: #e8dfc8;
      border: 1px solid #3a6a3a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .divider {
      width: 100%;
      max-width: 320px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #3a2e5a;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3a2e5a;
    }
    #drive-status {
      font-size: 0.78rem;
      color: #7068a0;
      min-height: 1.2em;
      text-align: center;
      padding: 0 16px;
    }
    #drive-status.error { color: #e06060; }
    #drive-status.ok    { color: #60c060; }
    #game {
      width: 100%;
      aspect-ratio: 240 / 160;
      background: #000;
      border: 2px solid #3a2e5a;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 40px #7040ff44;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      font-size: 0.8rem;
      color: #7068a0;
    }
    .controls span {
      background: #1a1630;
      border: 1px solid #3a2e5a;
      border-radius: 4px;
      padding: 4px 10px;
    }
    .controls strong { color: #c8b8f0; }
    footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: #4a4060;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <h1>SYGL</h1>
  <p>A Magykal RPG &nbsp;&bull;&nbsp; Choose your sigil. Shape your destiny.</p>
</header>

<div id="game-wrap">
  <div id="launch-screen">
    <h2>Select a ROM to play</h2>
    <div class="launch-btns">
      <button class="btn btn-primary" onclick="launchBuiltIn()">&#9654; Play Sygl</button>
    </div>

    <div class="divider">or load your own ROM</div>

    <div class="launch-btns">
      <!-- Local file upload -->
      <button class="btn btn-local" onclick="document.getElementById('file-input').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Load from Computer
      </button>
      <input type="file" id="file-input" accept=".gba,.gbc,.gb" onchange="launchFromFile(this)" />

      <!-- Google Drive -->
      <button class="btn btn-drive" onclick="launchFromDrive()">
        <svg width="18" height="18" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L28.5 48H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
          <path d="M43.65 25L29 0c-1.35.8-2.5 1.9-3.3 3.3L1.2 43.5c-.8 1.4-1.2 2.95-1.2 4.5h28.5z" fill="#00ac47"/>
          <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75L86.1 57c.8-1.4 1.2-2.95 1.2-4.5H58.8z" fill="#ea4335"/>
          <path d="M43.65 25L58.3 0H29z" fill="#00832d"/>
          <path d="M58.8 48l-15.15 28.8 14.65-28.8z" fill="#2684fc"/>
          <path d="M73.55 76.8L58.8 48H87.3c0 1.55-.4 3.1-1.2 4.5z" fill="#ffba00"/>
        </svg>
        Load from Google Drive
      </button>
    </div>

    <div id="drive-status"></div>
  </div>

  <div id="game" style="display:none"></div>

  <div class="controls">
    <span><strong>Arrow keys</strong> Move</span>
    <span><strong>Z</strong> A button</span>
    <span><strong>X</strong> B button</span>
    <span><strong>Enter</strong> Start</span>
    <span><strong>Shift</strong> Select</span>
    <span><strong>A / S</strong> L / R</span>
  </div>
</div>

<footer>Sygl &copy; knightdx91 &nbsp;&bull;&nbsp; Built with devkitARM &nbsp;&bull;&nbsp; Powered by EmulatorJS</footer>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>

<script>
  const GOOGLE_CLIENT_ID = '74660999441-3tu0u98phuckm7avp4kh6rnohpo84l1f.apps.googleusercontent.com';
  let accessToken = null;

  function launchBuiltIn() {
    startEmulator('sygl.gba', 'Sygl');
  }

  // ── Local file ──────────────────────────────────────────────────────────
  function launchFromFile(input) {
    const file = input.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    startEmulator(url, file.name.replace(/\.(gba|gbc|gb)$/i, ''));
  }

  // ── Google Drive ─────────────────────────────────────────────────────────
  function launchFromDrive() {
    setStatus('Signing in to Google…');
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.readonly',
      callback: (resp) => {
        if (resp.error) { setStatus('Sign-in failed: ' + resp.error, 'error'); return; }
        accessToken = resp.access_token;
        setStatus('Opening Drive picker…');
        gapi.load('picker', openPicker);
      },
    });
    client.requestAccessToken({ prompt: 'consent' });
  }

  function openPicker() {
    const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
      .setIncludeFolders(true)
      .setQuery('.gba');
    new google.picker.PickerBuilder()
      .setOAuthToken(accessToken)
      .addView(view)
      .setTitle('Pick a GBA ROM (.gba)')
      .setCallback(pickerCallback)
      .build()
      .setVisible(true);
  }

  async function pickerCallback(data) {
    if (data.action !== google.picker.Action.PICKED) {
      if (data.action === google.picker.Action.CANCEL) setStatus('');
      return;
    }
    const file = data.docs[0];
    setStatus('Downloading ' + file.name + '…');
    try {
      const resp = await fetch(
        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + accessToken } }
      );
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const blob = URL.createObjectURL(await resp.blob());
      setStatus(file.name + ' ready!', 'ok');
      startEmulator(blob, file.name.replace(/\.gba$/i, ''));
    } catch (err) {
      setStatus('Download failed: ' + err.message, 'error');
    }
  }

  // ── EmulatorJS ───────────────────────────────────────────────────────────
  function startEmulator(romUrl, romName) {
    document.getElementById('launch-screen').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    window.EJS_player        = '#game';
    window.EJS_core          = 'gba';
    window.EJS_gameUrl       = romUrl;
    window.EJS_gameName      = romName || 'game';
    window.EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_color         = '#f5c842';
    window.EJS_startOnLoaded = true;
    const s = document.createElement('script');
    s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    document.body.appendChild(s);
  }

  function setStatus(msg, type) {
    const el = document.getElementById('drive-status');
    el.textContent = msg;
    el.className = type || '';
  }
</script>

</body>
</html>
