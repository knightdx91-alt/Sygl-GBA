name: Build and Deploy GBA ROM

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ROM
        run: |
          export PYTHON=python3
          make

      - name: Locate ROM
        run: |
          echo "=== find . -name '*.gba' ==="
          find . -name "*.gba" 2>/dev/null || echo "no .gba files found"

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sygl-rom
          path: "**/*.gba"

      - name: Copy ROM into web folder
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          GBA=$(find . -name "*.gba" | head -1)
          echo "ROM found at: $GBA"
          cp "$GBA" web/sygl.gba

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
