name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Pages deploys independently — site goes live even before ROM compiles
  deploy-pages:
    name: Deploy Web Player to Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ROM build — separate so a compiler error doesn't block the site
  build-rom:
    name: Build GBA ROM
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GBA libraries
        run: |
          dkp-pacman -Sy --noconfirm gba-dev

      - name: Build sygl.gba
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sygl-gba-rom
          path: sygl.gba
          retention-days: 90
