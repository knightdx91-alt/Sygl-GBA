name: Build GBA ROM
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install devkitPro / devkitARM
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates git curl
        # Install devkitPro apt repo + installer
        curl -L https://apt.devkitpro.org/install.sh | sudo bash
        # Update package DB and install devkitARM (non-interactive)
        sudo dkp-pacman -Syu --noconfirm
        sudo dkp-pacman -S --noconfirm devkitARM
    - name: Show environment & versions
      run: |
        # ensure the environment provided by the installer is sourced
        source /etc/profile.d/devkitpro.sh || true
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITARM=$DEVKITARM"
        if [ -n "$DEVKITARM" ]; then
          "$DEVKITARM/toolchain/bin/arm-none-eabi-gcc" --version || true
        else
          arm-none-eabi-gcc --version || true
        fi
    - name: Build (devkitARM)
      run: |
        source /etc/profile.d/devkitpro.sh || true
        git submodule update --init --recursive
        # call make normally so the Makefiles detect DEVKITARM
        make
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/**
