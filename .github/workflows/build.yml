name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-rom:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug - sources_setup and gba_rules
        run: |
          export BUTANO_HOME=$PWD/butano/butano
          echo "=== sources_setup.mak ==="
          cat $BUTANO_HOME/tools/sources_setup.mak
          echo "=== gba_rules grep BUILD ==="
          grep -n 'BUILD' $DEVKITARM/gba_rules || echo 'not found'
          exit 1

  deploy-pages:
    needs: build-rom
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: sygl-gba-rom
          path: web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
