name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-rom:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug - print butano files then exit
        run: |
          export BUTANO_HOME=$PWD/butano/butano
          echo "=== butano.mak ==="
          cat $BUTANO_HOME/butano.mak
          echo "=== common_setup.mak lines 80-100 ==="
          sed -n '80,100p' $BUTANO_HOME/tools/common_setup.mak
          echo "=== our Makefile ==="
          cat Makefile
          echo "=== DONE ==="
          exit 1

  deploy-pages:
    needs: build-rom
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: sygl-gba-rom
          path: web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
