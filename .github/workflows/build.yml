name: Build GBA ROM
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install toolchain
      run: sudo apt-get update && sudo apt-get install -y build-essential make gcc-arm-none-eabi binutils-arm-none-eabi git
    - name: Build
      run: make
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/**
